<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#3c2f2f">
  <title>Coffee Brew Tracker</title>
  <!-- Load compiled Tailwind CSS -->
  <link href="/output.css" rel="stylesheet">
  <!-- Load React and ReactDOM -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Load Babel for JSX -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.5/babel.min.js"></script>
  <!-- Load Firebase SDK (compatibility mode) -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
  <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
  <div id="root" class="min-h-screen bg-gray-100"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDxOjvLjku6NPFmU20No0kJtk0cr5BgvKI",
      authDomain: "coffee-brew-tracker.firebaseapp.com",
      projectId: "coffee-brew-tracker",
      storageBucket: "coffee-brew-tracker.firebasestorage.app",
      messagingSenderId: "725897927336",
      appId: "1:725897927336:web:de7d287f60487c69a1809d",
      measurementId: "G-1RZTPYQEM6"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Main App Component
    function App() {
      const [user, setUser] = useState(null);
      const [brews, setBrews] = useState([]);
      const [beans, setBeans] = useState([]);
      const [brewForm, setBrewForm] = useState({
        beanId: '',
        grindSize: '',
        brewType: 'Espresso',
        machine: '',
        rating: 1,
        comments: '',
        brewDate: new Date().toISOString().split('T')[0]
      });
      const [beanForm, setBeanForm] = useState({
        beanType: '',
        origin: '',
        roastDate: ''
      });
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [error, setError] = useState('');

      // Listen for auth state changes
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((user) => {
          console.log('Auth state changed:', user ? user.uid : 'No user');
          setUser(user);
          if (user) {
            fetchBeans(user.uid).catch(err => console.error('Fetch beans error:', err));
            fetchBrews(user.uid).catch(err => console.error('Fetch brews error:', err));
          }
        });
        return () => unsubscribe();
      }, []);

      // Fetch beans from Firestore
      const fetchBeans = async (uid) => {
        try {
          console.log('Fetching beans for user:', uid);
          const beansRef = db.collection('beans').where('userId', '==', uid);
          const snapshot = await beansRef.get();
          const beansData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setBeans(beansData);
        } catch (err) {
          console.error('Error fetching beans:', err);
          throw err;
        }
      };

      // Fetch brews from Firestore
      const fetchBrews = async (uid) => {
        try {
          console.log('Fetching brews for user:', uid);
          const brewsRef = db.collection('brews').where('userId', '==', uid);
          const snapshot = await brewsRef.get();
          const brewsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setBrews(brewsData.sort((a, b) => new Date(b.brewDate) - new Date(a.brewDate)));
        } catch (err) {
          console.error('Error fetching brews:', err);
          throw err;
        }
      };

      // Handle brew form input changes
      const handleBrewInputChange = (e) => {
        const { name, value } = e.target;
        setBrewForm({ ...brewForm, [name]: value });
      };

      // Handle bean form input changes
      const handleBeanInputChange = (e) => {
        const { name, value } = e.target;
        setBeanForm({ ...beanForm, [name]: value });
      };

      // Add a new bean
      const handleBeanSubmit = async (e) => {
        e.preventDefault();
        if (!user) {
          setError('No authenticated user');
          return;
        }
        if (!beanForm.beanType || !beanForm.roastDate) {
          setError('Bean Type and Roast Date are required');
          return;
        }
        const beanData = { 
          beanType: beanForm.beanType.trim(),
          origin: beanForm.origin ? beanForm.origin.trim() : '',
          roastDate: beanForm.roastDate,
          userId: user.uid 
        };
        console.log('Saving bean:', beanData);
        try {
          await db.collection('beans').add(beanData);
          setBeanForm({ beanType: '', origin: '', roastDate: '' });
          await fetchBeans(user.uid);
          setError('');
        } catch (err) {
          console.error('Bean save error:', err);
          setError('Failed to save bean: ' + err.message);
        }
      };

      // Add a new brew
      const handleBrewSubmit = async (e) => {
        e.preventDefault();
        if (!user) {
          setError('No authenticated user');
          return;
        }
        const selectedBean = beans.find(bean => bean.id === brewForm.beanId);
        if (!selectedBean) {
          setError('Please select a bean');
          return;
        }
        const brewData = {
          ...brewForm,
          userId: user.uid,
          beanType: selectedBean.beanType,
          origin: selectedBean.origin,
          roastDate: selectedBean.roastDate
        };
        console.log('Saving brew:', brewData);
        try {
          await db.collection('brews').add(brewData);
          setBrewForm({
            beanId: '',
            grindSize: '',
            brewType: 'Espresso',
            machine: '',
            rating: 1,
            comments: '',
            brewDate: new Date().toISOString().split('T')[0]
          });
          await fetchBrews(user.uid);
          setError('');
        } catch (err) {
          console.error('Brew save error:', err);
          setError('Failed to save brew: ' + err.message);
        }
      };

      // Delete brew
      const deleteBrew = async (id) => {
        try {
          console.log('Deleting brew:', id);
          await db.collection('brews').doc(id).delete();
          await fetchBrews(user.uid);
        } catch (err) {
          console.error('Delete brew error:', err);
          setError('Failed to delete brew: ' + err.message);
        }
      };

      // Handle authentication
      const handleAuth = async (e) => {
        e.preventDefault();
        try {
          console.log('Attempting auth:', isSignUp ? 'Sign Up' : 'Log In', email);
          if (isSignUp) {
            await auth.createUserWithEmailAndPassword(email, password);
          } else {
            await auth.signInWithEmailAndPassword(email, password);
          }
          setError('');
        } catch (err) {
          console.error('Auth error:', err);
          setError(err.message);
        }
      };

      // Sign out
      const signOut = () => {
        console.log('Signing out');
        auth.signOut();
        setBrews([]);
        setBeans([]);
      };

      // Render auth form if not logged in
      if (!user) {
        return (
          <div className="flex items-center justify-center min-h-screen">
            <div className="bg-white p-6 rounded-lg shadow-lg w-full max-w-md">
              <h2 className="text-2xl font-bold mb-4">{isSignUp ? 'Sign Up' : 'Log In'}</h2>
              <form onSubmit={handleAuth}>
                <input
                  type="email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  placeholder="Email"
                  className="w-full p-2 mb-4 border rounded"
                  required
                />
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  placeholder="Password"
                  className="w-full p-2 mb-4 border rounded"
                  required
                />
                <button type="submit" className="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
                  {isSignUp ? 'Sign Up' : 'Log In'}
                </button>
              </form>
              <button
                onClick={() => setIsSignUp(!isSignUp)}
                className="mt-4 text-blue-500 hover:underline"
              >
                {isSignUp ? 'Already have an account? Log In' : 'Need an account? Sign Up'}
              </button>
              {error && <p className="text-red-500 mt-4">{error}</p>}
            </div>
          </div>
        );
      }

      // Render main app
      return (
        <div className="container mx-auto p-4 max-w-md">
          <div className="flex justify-between items-center mb-6">
            <h1 className="text-3xl font-bold">Coffee Brew Tracker</h1>
            <button onClick={signOut} className="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
              Sign Out
            </button>
          </div>

          {/* Add Bean Form */}
          <div className="bg-white p-6 rounded-lg shadow-lg mb-6">
            <h2 className="text-xl font-semibold mb-4">Add Coffee Bean</h2>
            <form onSubmit={handleBeanSubmit}>
              <div className="mb-4">
                <label htmlFor="beanType" className="block text-sm font-medium text-gray-700">Bean Type</label>
                <input
                  type="text"
                  name="beanType"
                  id="beanType"
                  value={beanForm.beanType}
                  onChange={handleBeanInputChange}
                  placeholder="e.g., Illy Arabica"
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <div className="mb-4">
                <label htmlFor="origin" className="block text-sm font-medium text-gray-700">Origin</label>
                <input
                  type="text"
                  name="origin"
                  id="origin"
                  value={beanForm.origin}
                  onChange={handleBeanInputChange}
                  placeholder="e.g., Ethiopia"
                  className="w-full p-2 border rounded"
                />
              </div>
              <div className="mb-4">
                <label htmlFor="roastDate" className="block text-sm font-medium text-gray-700">Roast Date</label>
                <input
                  type="date"
                  name="roastDate"
                  id="roastDate"
                  value={beanForm.roastDate}
                  onChange={handleBeanInputChange}
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <button
                type="submit"
                className="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600"
              >
                Save Bean
              </button>
            </form>
            {error && <p className="text-red-500 mt-4">{error}</p>}
          </div>

          {/* Add Brew Form */}
          <div className="bg-white p-6 rounded-lg shadow-lg mb-6">
            <h2 className="text-xl font-semibold mb-4">Add New Brew</h2>
            <form onSubmit={handleBrewSubmit}>
              <div className="mb-4">
                <label htmlFor="beanId" className="block text-sm font-medium text-gray-700">Select Bean</label>
                <select
                  name="beanId"
                  id="beanId"
                  value={brewForm.beanId}
                  onChange={handleBrewInputChange}
                  className="w-full p-2 border rounded"
                  required
                >
                  <option value="">-- Select a Bean --</option>
                  {beans.map(bean => (
                    <option key={bean.id} value={bean.id}>
                      {bean.beanType} ({bean.origin}, Roasted: {bean.roastDate})
                    </option>
                  ))}
                </select>
              </div>
              <div className="mb-4">
                <label htmlFor="grindSize" className="block text-sm font-medium text-gray-700">Grind Size</label>
                <input
                  type="text"
                  name="grindSize"
                  id="grindSize"
                  value={brewForm.grindSize}
                  onChange={handleBrewInputChange}
                  placeholder="e.g., Medium-Fine"
                  className="w-full p-2 border rounded"
                />
              </div>
              <div className="mb-4">
                <label htmlFor="brewType" className="block text-sm font-medium text-gray-700">Brew Type</label>
                <select
                  name="brewType"
                  id="brewType"
                  value={brewForm.brewType}
                  onChange={handleBrewInputChange}
                  className="w-full p-2 border rounded"
                >
                  <option value="Espresso">Espresso</option>
                  <option value="Americano">Americano</option>
                </select>
              </div>
              <div className="mb-4">
                <label htmlFor="machine" className="block text-sm font-medium text-gray-700">Machine</label>
                <input
                  type="text"
                  name="machine"
                  id="machine"
                  value={brewForm.machine}
                  onChange={handleBrewInputChange}
                  placeholder="e.g., De’Longhi Dedica"
                  className="w-full p-2 border rounded"
                />
              </div>
              <div className="mb-4">
                <label htmlFor="rating" className="block text-sm font-medium text-gray-700">Rating</label>
                <select
                  name="rating"
                  id="rating"
                  value={brewForm.rating}
                  onChange={handleBrewInputChange}
                  className="w-full p-2 border rounded"
                >
                  {[1, 2, 3, 4, 5].map(n => (
                    <option key={n} value={n}>{n} Star{n > 1 ? 's' : ''}</option>
                  ))}
                </select>
              </div>
              <div className="mb-4">
                <label htmlFor="comments" className="block text-sm font-medium text-gray-700">Flavor Comments</label>
                <textarea
                  name="comments"
                  id="comments"
                  value={brewForm.comments}
                  onChange={handleBrewInputChange}
                  placeholder="Flavor Comments"
                  className="w-full p-2 border rounded"
                />
              </div>
              <div className="mb-4">
                <label htmlFor="brewDate" className="block text-sm font-medium text-gray-700">Brew Date</label>
                <input
                  type="date"
                  name="brewDate"
                  id="brewDate"
                  value={brewForm.brewDate}
                  onChange={handleBrewInputChange}
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <button
                type="submit"
                className="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600"
              >
                Save Brew
              </button>
            </form>
            {error && <p className="text-red-500 mt-4">{error}</p>}
          </div>

          {/* Brew List */}
          <div>
            <h2 className="text-xl font-semibold mb-4">Your Brews</h2>
            {brews.length === 0 ? (
              <p>No brews yet. Add one above!</p>
            ) : (
              brews.map(brew => (
                <div key={brew.id} className="bg-white p-4 rounded-lg shadow-lg mb-4">
                  <h3 className="text-lg font-semibold">{brew.beanType} - {brew.brewType}</h3>
                  <p><strong>Origin:</strong> {brew.origin}</p>
                  <p><strong>Roast Date:</strong> {brew.roastDate}</p>
                  <p><strong>Grind Size:</strong> {brew.grindSize}</p>
                  <p><strong>Machine:</strong> {brew.machine}</p>
                  <p><strong>Rating:</strong> {brew.rating} Star{brew.rating > 1 ? 's' : ''}</p>
                  <p><strong>Comments:</strong> {brew.comments}</p>
                  <p><strong>Brew Date:</strong> {brew.brewDate}</p>
                  <button
                    onClick={() => deleteBrew(brew.id)}
                    className="mt-2 bg-red-500 text-white px-4 py-1 rounded hover:bg-red-600"
                  >
                    Delete
                  </button>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // Render the app
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <!-- Service Worker for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.error('Service Worker Error:', err));
    }
  </script>
</body>
</html>
